[dataset]
name = "wm811k_multiclass"
raw_pickle = "data/raw/LSWMD.pkl"
processed_root = "data/processed/x64/wm811k_multiclass"
labeled_metadata_csv = "data/processed/x64/wm811k_multiclass/metadata_labeled.csv"
labeled_arrays_dir = "data/processed/x64/wm811k_multiclass/arrays_labeled"
unlabeled_predictions_csv = "artifacts/multiclass_classifier/unlabeled_predictions.csv"
image_size = 64
class_names = [
  "none",
  "Center",
  "Donut",
  "Edge-Loc",
  "Edge-Ring",
  "Loc",
  "Near-full",
  "Random",
  "Scratch",
]

[splits]
train_fraction = 0.70
val_fraction = 0.15
test_fraction = 0.15
random_seed = 42
