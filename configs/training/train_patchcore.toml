[run]
output_dir = "artifacts/x64/patchcore_ae_bn"
seed = 42

[data]
metadata_csv = "data/processed/x64/wm811k/metadata_50k_5pct.csv"
image_size = 64
batch_size = 64
num_workers = 0

[training]
device = "auto"

[model]
type = "patchcore"
backbone_checkpoint = "artifacts/x64/autoencoder_batchnorm/best_model.pt"
use_batchnorm = true
memory_bank_size = 50000
reduction = "max"
topk_ratio = 0.1
query_chunk_size = 2048
memory_chunk_size = 8192
