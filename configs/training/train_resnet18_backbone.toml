[run]
output_dir = "artifacts/x64/resnet18_embedding_baseline"
seed = 42

[data]
metadata_csv = "data/processed/x64/wm811k/metadata_50k_5pct.csv"
image_size = 64
batch_size = 64
num_workers = 0

[training]
device = "auto"

[model]
type = "resnet18_backbone"
pretrained = true
freeze_backbone = true
input_size = 224
normalize_imagenet = true

[scoring]
name = "center_l2"
threshold_quantile = 0.95
