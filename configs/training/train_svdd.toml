[run]
output_dir = "artifacts/x64/svdd_baseline"
seed = 42

[data]
metadata_csv = "data/processed/x64/wm811k/metadata_50k_5pct.csv"
image_size = 64
batch_size = 64
num_workers = 0

[training]
epochs = 30
learning_rate = 0.0005
weight_decay = 0.00001
device = "auto"
early_stopping_patience = 5
early_stopping_min_delta = 0.0001
checkpoint_every = 5
resume_from = ""

[model]
type = "svdd"
latent_dim = 128
center_eps = 0.1
