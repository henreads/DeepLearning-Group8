[run]
output_dir = "experiments/anomaly_detection/autoencoder/x64/residual/artifacts/autoencoder_residual"
seed = 42

[data]
metadata_csv = "data/processed/x64/wm811k/metadata_50k_5pct.csv"
image_size = 64
batch_size = 64
num_workers = 0

[training]
epochs = 50
learning_rate = 0.001
weight_decay = 0.0001
device = "auto"
early_stopping_patience = 5
early_stopping_min_delta = 0.00005
checkpoint_every = 5
resume_from = ""

[model]
type = "autoencoder"
architecture = "residual"
latent_dim = 128
use_batchnorm = true
dropout_prob = 0.0
